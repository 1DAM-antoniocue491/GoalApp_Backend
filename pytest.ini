# pytest.ini
[pytest]
# Directorio de tests
testpaths = tests

# Patron de archivos de test
python_files = test_*.py

# Patron de clases de test
python_classes = Test*

# Patron de funciones de test
python_functions = test_*

# Opciones por defecto
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers personalizados
markers =
    slow: tests que tardan mas de 1 segundo
    unit: tests unitarios (SQLite en memoria, sin red)
    integration: tests de integracion (requieren API remota)
    auth: tests de autenticacion
    database: tests que interactuan con BD
    smoke: tests de humo para verificacion rapida

# Configuracion de logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Directorio de cache
cache_dir = .pytest_cache